<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专利附图标记智能排版</title>
    <style>
        /* 护眼模式（默认） */
        :root {
            --primary-color: #2e7d32;
            --primary-hover: #1b5e20;
            --secondary-color: #558b2f;
            --secondary-hover: #33691e;
            --bg-glass: rgba(199, 237, 204, 0.75);
            --border-glass: rgba(0, 0, 0, 0.08);
            --text-color: #2e3d2f;
            --text-muted: #5f7060;
            --bg-body: #C7EDCC;
            --text-white: #1a2e1a;
            --toast-bg: rgba(245, 250, 245, 0.95);
            --toast-text: #2e3d2f;
            --scrollbar-track: rgba(0, 0, 0, 0.05);
            --scrollbar-thumb: rgba(0, 0, 0, 0.15);
            --scrollbar-thumb-hover: rgba(0, 0, 0, 0.3);
            --input-focus-bg: rgba(180, 220, 185, 0.85);
            --input-focus-shadow: rgba(46, 125, 50, 0.25);
            --placeholder-color: rgba(0, 0, 0, 0.35);
            --tag-bg-start: rgba(0,0,0,0.05);
            --tag-bg-end: rgba(0,0,0,0.02);
            --action-link-bg: rgba(0, 0, 0, 0.04);
            --action-link-border: rgba(0, 0, 0, 0.15);
            --btn-shadow: rgba(46, 125, 50, 0.3);
            --gradient-start: #2e7d32;
            --gradient-end: #558b2f;
            --shadow-color: rgba(0, 0, 0, 0.08);
        }

        /* 白色明亮模式 */
        [data-theme="light"] {
            --primary-color: #00897b;
            --primary-hover: #00695c;
            --secondary-color: #1565c0;
            --secondary-hover: #0d47a1;
            --bg-glass: rgba(255, 255, 255, 0.8);
            --border-glass: rgba(0, 0, 0, 0.08);
            --text-color: #333333;
            --text-muted: #757575;
            --bg-body: #f5f5f5;
            --text-white: #222222;
            --toast-bg: rgba(255, 255, 255, 0.97);
            --toast-text: #333333;
            --scrollbar-track: rgba(0, 0, 0, 0.04);
            --scrollbar-thumb: rgba(0, 0, 0, 0.15);
            --scrollbar-thumb-hover: rgba(0, 0, 0, 0.3);
            --input-focus-bg: rgba(255, 255, 255, 0.95);
            --input-focus-shadow: rgba(0, 137, 123, 0.2);
            --placeholder-color: rgba(0, 0, 0, 0.3);
            --tag-bg-start: rgba(0,0,0,0.04);
            --tag-bg-end: rgba(0,0,0,0.01);
            --action-link-bg: rgba(0, 0, 0, 0.03);
            --action-link-border: rgba(0, 0, 0, 0.12);
            --btn-shadow: rgba(0, 137, 123, 0.3);
            --gradient-start: #00897b;
            --gradient-end: #1565c0;
            --shadow-color: rgba(0, 0, 0, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            text-align: center;
            background-color: var(--bg-body);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            color: var(--text-color);
            transition: background-color 0.3s ease;
        }

        /* 自定义动态提示框 (Toast) */
        #toast-container {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
        }

        .toast {
            background: var(--toast-bg);
            color: var(--toast-text);
            padding: 14px 24px;
            border-radius: 8px;
            box-shadow: 0 8px 16px var(--shadow-color);
            backdrop-filter: blur(8px);
            font-size: 14px;
            letter-spacing: 0.5px;
            opacity: 0;
            border-left: 5px solid var(--primary-color);
            transform: translateX(120%);
            animation: slideIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            display: flex;
            align-items: center;
        }

        .toast.error {
            border-left-color: #ff5252;
        }

        .toast.success {
            border-left-color: #00e676;
        }

        @keyframes slideIn {
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeOut {
            to { opacity: 0; transform: translateX(120%); }
        }

        .title {
            margin: 0 0 30px;
            padding: 20px 30px;
            text-align: left;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            font-size: 15px;
            border-radius: 16px;
            box-shadow: 0 8px 32px var(--shadow-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            max-width: 900px;
            width: 100%;
            line-height: 1.8;
            color: var(--text-white);
        }

        .title h1 {
            font-size: 24px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .title span {
            font-weight: bold;
            display: block;
            margin-top: 10px;
            color: var(--primary-color);
        }

        .title p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .content-wrapper {
            width: 100%;
            max-width: 1400px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            flex: 1;
        }

        .input-section {
            width: 100%;
        }

        .flex-container {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            gap: 30px;
            flex: 1;
            margin-bottom: 20px;
        }

        textarea {
            font-family: inherit;
            font-size: 15px;
            background-color: var(--bg-glass);
            color: var(--text-white);
            resize: none;
            line-height: 1.6;
            border-radius: 12px;
            padding: 18px;
            border: 1px solid var(--border-glass);
            box-shadow: inset 0 2px 10px var(--shadow-color);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }

        textarea::placeholder {
            color: var(--placeholder-color);
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: var(--input-focus-bg);
            box-shadow: 0 0 15px var(--input-focus-shadow);
        }

        #t1 {
            width: 100%;
            height: 100px;
        }

        .text-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            text-align: left;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header span.tag {
            display: inline-block;
            padding: 8px 18px;
            background: linear-gradient(135deg, var(--tag-bg-start), var(--tag-bg-end));
            border: 1px solid var(--border-glass);
            color: var(--text-white);
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            box-shadow: 0 4px 12px var(--shadow-color);
            backdrop-filter: blur(10px);
        }

        .action-link {
            padding: 6px 16px;
            background-color: var(--action-link-bg);
            border: 1px solid var(--action-link-border);
            color: var(--text-white);
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .action-link:hover {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: #fff;
            transform: translateY(-1px);
        }

        #t2, #t3 {
            width: 100%;
            flex: 1;
            min-height: 450px;
        }

        .btnGroup {
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 200px;
            gap: 16px;
        }

        .btnGroup button {
            width: 100%;
            border: 1px solid var(--border-glass);
            border-radius: 30px;
            padding: 14px 10px;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 0.5px;
            color: var(--text-white);
            cursor: pointer;
            background-color: var(--bg-glass);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 6px var(--shadow-color);
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .btnGroup button:hover {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 15px var(--btn-shadow);
            color: #fff;
        }

        .btnGroup button:active {
            transform: translateY(0) scale(0.98);
        }

        .btnGroup button .sub-text {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: normal;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 5px;
            border: 2px solid transparent;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--scrollbar-thumb-hover);
        }

        /* 主题切换按钮 */
        #theme-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10000;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--border-glass);
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px var(--shadow-color);
        }

        #theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px var(--shadow-color);
        }
    </style>
</head>
<body>
    <button id="theme-toggle" onclick="toggleTheme()" title="切换主题">
        <span id="theme-icon">🌿</span>
    </button>
    <div id="toast-container"></div>



    <div class="content-wrapper">
        <!-- 顶部输入区 -->
        <div class="input-section text-panel" style="flex: none;">
            <div class="panel-header">
                <span class="tag">📌 标记说明配置区</span>
                <button class="action-link" onclick="clearT1()">🗑️ 清空配置</button>
            </div>
            <textarea name="t1" id="t1" placeholder="📌 请输入标记说明（支持任意符号连接）：&#10;1、转子引擎，2-燃烧室，3 外壳A，24.活塞 ……"></textarea>
        </div>

        <!-- 下方主要内容区 -->
        <div class="flex-container">
            <!-- 左侧文本 -->
            <div class="text-panel">
                <div class="panel-header">
                    <span class="tag">📝 原文工作区</span>
                    <button class="action-link" onclick="clearT2()">🗑️ 清空原文</button>
                </div>
                <textarea name="t2" id="t2" placeholder="在此粘贴需要处理的原始专利段落..."></textarea>
            </div>

            <!-- 操作按钮 -->
            <div class="btnGroup">
                <button onclick="init(1)">发明内容 ⇒ 实施例<br><span class="sub-text">无 ⇒ 1</span></button>
                <button onclick="init(2)">发明内容 ⇒ 权利要求<br><span class="sub-text">无 ⇒ (1)</span></button>
                <button onclick="init(3)">实施例 ⇒ 发明内容<br><span class="sub-text">1 ⇒ 无</span></button>
                <button onclick="init(4)">实施例 ⇒ 权利要求<br><span class="sub-text">1 ⇒ (1)</span></button>
                <button onclick="init(5)">权利要求 ⇒ 发明内容<br><span class="sub-text">(1) ⇒ 无</span></button>
                <button onclick="init(6)">权利要求 ⇒ 实施例<br><span class="sub-text">(1) ⇒ 1</span></button>
            </div>

            <!-- 右侧生成 -->
            <div class="text-panel">
                <div class="panel-header">
                    <span class="tag">✨ 编译输出区</span>
                    <div>
                        <button class="action-link" onclick="clearT3()" style="margin-right: 8px;">🗑️ 清空输出</button>
                        <button class="action-link" onclick="copyT3(this)">✨ 一键复制</button>
                    </div>
                </div>
                <textarea name="t3" id="t3" placeholder="编译完毕的转换结果将在此实时呈现..." readonly></textarea>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        // --- 主题切换系统 ---
        function getStoredTheme() {
            return localStorage.getItem('app_theme') || 'eye-protection';
        }

        function applyTheme(theme) {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (theme === 'light') {
                html.setAttribute('data-theme', 'light');
                if (icon) icon.textContent = '☀️';
            } else {
                html.removeAttribute('data-theme');
                if (icon) icon.textContent = '🌿';
            }
            localStorage.setItem('app_theme', theme);
        }

        function toggleTheme() {
            const current = getStoredTheme();
            const next = current === 'eye-protection' ? 'light' : 'eye-protection';
            applyTheme(next);
            showToast(next === 'eye-protection' ? '已切换至护眼模式 🌿' : '已切换至明亮模式 ☀️', 'success');
        }

        // 立即应用已保存的主题，防止闪烁
        applyTheme(getStoredTheme());

        // --- UI 逻辑：Toast 提示框 ---
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = message;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards';
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // --- 本地缓存机制 ---
        window.addEventListener('DOMContentLoaded', () => {
            const cachedT1 = localStorage.getItem('t1_cache');
            if (cachedT1) document.getElementById('t1').value = cachedT1;
            
            document.getElementById('t1').addEventListener('input', function() {
                localStorage.setItem('t1_cache', this.value);
            });
        });

        // --- 清理机制 ---
        function clearT1() {
            if(confirm('警告：是否确定清空顶部标记说明的数据？')) {
                document.getElementById('t1').value = '';
                localStorage.removeItem('t1_cache');
                showToast("标记说明已被清空", "success");
            }
        }

        function clearT2() {
            document.getElementById('t2').value = '';
            showToast("已清空原文工作区", "success");
        }

        function clearT3() {
            document.getElementById('t3').value = '';
            showToast("已清空输出区", "success");
        }

        // --- 复制机制 ---
        function copyT3(btn) {
            const t3 = document.getElementById('t3');
            if(!t3.value) {
                showToast("输出区为空，无内容可复制！", "error");
                return;
            }
            navigator.clipboard.writeText(t3.value).then(() => {
                const originalText = btn.innerHTML;
                btn.innerHTML = "复制成功 ✔";
                btn.style.backgroundColor = "var(--primary-color)";
                btn.style.borderColor = "var(--primary-color)";
                setTimeout(() => { 
                    btn.innerHTML = originalText; 
                    btn.style.backgroundColor = "";
                    btn.style.borderColor = "";
                }, 2000);
                showToast("已提取结果至系统剪贴板", "success");
            }).catch(err => {
                showToast('剪贴板接口拒绝访问，请手动框选复制', 'error');
            });
        }

        // --- 核心安全替换引擎 ---
        function replaceText(sourceText, replaceDict) {
            if (!sourceText || Object.keys(replaceDict).length === 0) return sourceText;
            const keys = Object.keys(replaceDict).sort((a, b) => b.length - a.length);
            const escapeRegex = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const pattern = keys.map(escapeRegex).join('|');
            const regex = new RegExp(pattern, 'g');
            return sourceText.replace(regex, (match) => replaceDict[match]);
        }

        // --- 主控逻辑栈 ---
        function init(type) {
            const t1 = document.getElementById("t1").value;
            const t2 = document.getElementById("t2").value;
            const t3 = document.getElementById("t3");
            
            if(!t1.trim()) { showToast("字典库缺失：请先配置顶部附图标记！", "error"); return; }
            if(!t2.trim()) { showToast("原料缺失：请填入需处理的原文！", "error"); return; }

            const arr1 = [], arr2 = [], arr3 = [], arr3Half = [];

            // 预处理：将换行符替换为分号，确保跨行条目能被正确匹配
            const t1Normalized = t1.replace(/\r?\n/g, '；');

            // 增强版双向词法解析机制：支持”数字+名称”和”名称+数字”
            const parseRegex = /(\d+)[\s、.，,；;\-:：|]*([\u4e00-\u9fa5a-zA-Z]+)|([\u4e00-\u9fa5a-zA-Z]+)[\s、.，,；;\-:：|]*(\d+)/g;
            let matchObj, foundCount = 0;

            while ((matchObj = parseRegex.exec(t1Normalized)) !== null) {
                let num, name;
                if (matchObj[1] && matchObj[2]) {
                    num = matchObj[1];
                    name = matchObj[2].trim();
                } else if (matchObj[3] && matchObj[4]) {
                    name = matchObj[3].trim();
                    num = matchObj[4];
                }
                
                if (name) {
                    arr1.push(name);
                    arr2.push(name + num);
                    arr3.push(name + '（' + num + '）');
                    arr3Half.push(name + '(' + num + ')'); // 追加半角支持
                    foundCount++;
                }
            }

            if (foundCount === 0) {
                showToast("致命排版错误：该标记说明片段未能被识别！", "error");
                return;
            }
            
            const createDict = (sourceArr, targetArr) => {
                const dict = {};
                for(let i = 0; i < sourceArr.length; i++) dict[sourceArr[i]] = targetArr[i];
                return dict;
            };

            let replaceDict = {};
            switch(type) {
                case 1: 
                    for(let i = 0; i < arr1.length; i++) {
                        replaceDict[arr1[i]] = arr2[i];
                        replaceDict["所述" + arr1[i]] = arr2[i]; // 精确过滤“所述”
                    }
                    break;
                case 2: 
                    for(let i = 0; i < arr1.length; i++) {
                        replaceDict[arr1[i]] = arr3[i]; 
                    }
                    break;
                case 3: replaceDict = createDict(arr2, arr1); break;
                case 4: replaceDict = createDict(arr2, arr3); break;
                case 5: 
                    for(let i = 0; i < arr3.length; i++) {
                        replaceDict[arr3[i]] = arr1[i];
                        replaceDict[arr3Half[i]] = arr1[i]; // 全半角兼容
                    }
                    break;
                case 6: 
                    for(let i = 0; i < arr3.length; i++) {
                        replaceDict[arr3[i]] = arr2[i];
                        replaceDict[arr3Half[i]] = arr2[i]; // 全半角兼容
                    }
                    break;
            }

            // 投递进入转换栈
            t3.value = replaceText(t2, replaceDict);
            showToast(`格式转换成功，字典解析命中率达成！`, "success");
        }
    </script>
</body>
</html>
